<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6/1 Smart Hub</title>
    
    <!-- เชื่อมต่อไฟล์ Manifest สำหรับ Add to Home Screen -->
    <link rel="manifest" href="manifest.json">
    
    <!-- รองรับ Safari (iOS) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="6/1 Smart Hub">
    <link rel="apple-touch-icon" href="https://img1.pic.in.th/images/6-1hub.png">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbwMz7n4ImOZy13tkC9sYiEU-S1GZCGQqcz83j3nyQZkQgkLpQzqh8VHD2z9hcA0odXr/exec" allowfullscreen></iframe>

    <!-- สคริปต์เปิดทำงาน Service Worker (จำเป็นสำหรับ PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker ลงทะเบียนสำเร็จ!', reg))
            .catch(err => console.log('Service Worker ผิดพลาด:', err));
        }
    </script>
</body>
</html>
