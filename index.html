<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"">
  <title>6/1 Smart Hub</title>
  <style>
    /* สไตล์สำหรับกล่องหุ้ม เพื่อเว้นระยะหลบติ่ง iPhone */
    .iframe-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      /* ดันเนื้อหาด้านบนลงมาหลบติ่ง */
      padding-top: env(safe-area-inset-top); 
      /* ดันเนื้อหาด้านล่างขึ้นมาหลบแถบโฮมขีดล่างของ iPhone (ถ้ามี) */
      padding-bottom: env(safe-area-inset-bottom);
      box-sizing: border-box;
      background-color: #ffffff; /* กำหนดสีพื้นหลังตรงติ่งตามที่คุณต้องการ */
    }

    .responsive-iframe {
      position: absolute;
      /* ปรับ top ให้เริ่มจากขอบล่างของพื้นที่ปลอดภัย */
      top: env(safe-area-inset-top); 
      left: 0;
      width: 100vw;
      /* คำนวณความสูงใหม่ โดยหักระยะติ่งและแถบโฮมออก */
      height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      border: none;
    }
  </style>
</head>
<body>
  <!-- เพิ่มคลาส iframe-container ที่นี่ -->
  <div class="iframe-container"> 
    <iframe id="myframe" class="responsive-iframe" src="" allowFullScreen></iframe>
  </div>
  <script>
    const apps = new URL(window.location);
    const formUrl = apps.searchParams.get('apps');
    const url = decodeURIComponent(formUrl);
    document.getElementById('myframe').src = url;
  </script>
</body>
</html>
